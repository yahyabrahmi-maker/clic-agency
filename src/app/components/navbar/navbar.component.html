<header class="nav" [class.is-scrolled]="scrolled" [class.is-menu-open]="menuOpen">
  <div class="nav-inner container">
<a href="#top" class="brand" data-cursor="home" aria-label="CLIC home">
  <span class="brand-mark">
    <img src="assets/ClicT2.svg" alt="CLIC logo" />
  </span>
  <span class="brand-text"><span class="brand-dot"></span></span>
</a>

    <nav class="nav-links" aria-label="Primary">
      <a *ngFor="let link of links; let i = index"
         [href]="link.href"
         class="nav-link"
         data-cursor="view">
        <span class="nav-num">0{{ i + 1 }}</span>
        <span class="nav-label">{{ link.label }}</span>
      </a>
    </nav>

    <a href="#contact" class="nav-cta" data-cursor="say hi">
      <span>Start a project</span>
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <button class="nav-burger"
            type="button"
            [attr.aria-expanded]="menuOpen"
            aria-label="Toggle menu"
            (click)="toggleMenu()">
      <span></span><span></span>
    </button>
  </div>

  <div class="nav-mobile" [class.is-open]="menuOpen">
    <a *ngFor="let link of links; let i = index"
       [href]="link.href"
       class="nav-mobile-link"
       (click)="closeMenu()">
      <span class="nav-num">0{{ i + 1 }}</span>
      {{ link.label }}
    </a>
    <a href="#contact" class="nav-mobile-cta" (click)="closeMenu()">Start a project →</a>
  </div>
</header>
